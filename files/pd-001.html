<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주간 시간 사용 현황 - 동수님</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card h3 {
            color: #667eea;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
        }
        
        .stat-card .label {
            color: #718096;
            font-size: 0.9em;
        }
        
        .chart-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .chart-container h2 {
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .chart-wrapper {
            position: relative;
            height: 400px;
        }
        
        .timeline {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .timeline h2 {
            color: #2d3748;
            margin-bottom: 25px;
            font-size: 1.5em;
        }
        
        .day-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .day-section:last-child {
            border-bottom: none;
        }
        
        .day-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .day-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #667eea;
            margin-right: 15px;
        }
        
        .day-date {
            color: #718096;
            font-size: 0.9em;
        }
        
        .event-item {
            background: #f7fafc;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        
        .event-item:hover {
            background: #edf2f7;
            transform: translateX(5px);
        }
        
        .event-time {
            color: #667eea;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .event-title {
            color: #2d3748;
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        
        .event-description {
            color: #718096;
            font-size: 0.85em;
            line-height: 1.5;
        }
        
        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.75em;
            font-weight: bold;
            margin-top: 8px;
        }
        
        .category-revenue { background: #fef5e7; color: #d68910; }
        .category-ceo { background: #ebf4ff; color: #3182ce; }
        .category-tech { background: #e8f5e9; color: #2e7d32; }
        .category-meeting { background: #fce4ec; color: #c2185b; }
        .category-admin { background: #f3e5f5; color: #7b1fa2; }
        .category-other { background: #eceff1; color: #546e7a; }
        
        .insights {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .insights h2 {
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .insight-item {
            background: #f7fafc;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .insight-item strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 주간 시간 사용 현황</h1>
            <p>2026년 1월 13일 (월) ~ 1월 19일 (일)</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>총 일정 시간</h3>
                <div class="value" id="totalHours">0</div>
                <div class="label">시간</div>
            </div>
            
            <div class="stat-card">
                <h3>예정된 이벤트</h3>
                <div class="value" id="totalEvents">0</div>
                <div class="label">개</div>
            </div>
            
            <div class="stat-card">
                <h3>가장 바쁜 날</h3>
                <div class="value" id="busiestDay" style="font-size: 1.8em;">-</div>
                <div class="label">일정 수</div>
            </div>
            
            <div class="stat-card">
                <h3>평균 일일 일정</h3>
                <div class="value" id="avgDaily">0</div>
                <div class="label">시간/일</div>
            </div>
        </div>
        
        <div class="chart-container">
            <h2>📈 카테고리별 시간 배분</h2>
            <div class="chart-wrapper">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>
        
        <div class="chart-container">
            <h2>📅 일별 시간 사용량</h2>
            <div class="chart-wrapper">
                <canvas id="dailyChart"></canvas>
            </div>
        </div>
        
        <div class="timeline">
            <h2>🗓️ 주간 일정 타임라인</h2>
            <div id="timelineContent"></div>
        </div>
        
        <div class="insights">
            <h2>💡 주요 인사이트</h2>
            <div id="insightsContent"></div>
        </div>
    </div>

    <script>
        // 실제 캘린더 데이터
        const calendarEvents = [
            {
                date: '2026-01-13',
                dayName: '월요일',
                events: [
                    { time: '09:00-09:30', title: '법원 데드라인', category: 'admin' },
                    { time: '09:45-11:00', title: '삼성', category: 'meeting' },
                    { time: '10:00-12:00', title: 'AI BM 수익화 모델 및 요금제 결정', description: 'AI 서비스의 지속 가능한 수익 창출을 위해 비즈니스 모델(BM)을 재정비하고, 시장 경쟁력을 고려한 최적의 요금 정책(Pricing)을 확정합니다.', category: 'revenue' },
                    { time: '14:00-15:30', title: 'R&D 성과의 사업화 및 매출 연계', description: '보유한 스마트시티 및 보안 원천 기술을 즉각적인 매출로 연결하기 위한 상용화(Commercialization) 전략을 수립하고, 공공/민간 수주 파이프라인을 점검합니다.', category: 'revenue' },
                    { time: '16:30-18:00', title: 'ROI 중심 자원 배분 및 영업이익 관리', description: '프로젝트별 투자 대비 수익률(ROI)을 철저히 분석하여 저성과 분야의 리소스를 조정하고, 영업이익률 극대화를 위한 비용 효율화 방안을 실행합니다.', category: 'revenue' }
                ]
            },
            {
                date: '2026-01-14',
                dayName: '화요일',
                events: [
                    { time: '10:00-12:30', title: '쿠팡 채널 수익 최적화 및 BM 고도화', description: '쿠팡 플랫폼의 알고리즘과 트래픽 패턴을 분석하여 마진율을 극대화할 수 있는 비즈니스 모델(BM)을 재설계하고, 즉각적인 매출 증대를 위한 전략을 확정합니다.', category: 'revenue' },
                    { time: '11:00-12:00', title: '쿠팡 잠실 본사 미팅', category: 'meeting' },
                    { time: '14:00-15:30', title: '쿠팡 데이터 분석 및 운영 자동화 기술 구현', description: 'Python 및 데이터 분석 역량을 활용하여 쿠팡 판매 데이터를 심층 분석하고, 물류 및 가격 결정을 자동화하여 운영 비용을 절감하는 기술적 방안을 검토합니다.', category: 'tech' },
                    { time: '16:30-18:00', title: '쿠팡 매출 견인 실행 계획 및 자원 집중', description: '쿠팡 내 광고 집행 성과(ROAS)를 점검하여 마케팅 예산을 효율적으로 재배분하고, 판매량 증대를 위한 부서별 구체적인 실행 목표를 하달합니다.', category: 'revenue' }
                ]
            },
            {
                date: '2026-01-15',
                dayName: '수요일',
                events: [
                    { time: '10:00-11:30', title: '1분기 재무 성과 및 IR 전략 점검', description: '매출, 영업이익 등 핵심 재무 지표를 분석하고 투자 유치(IR) 전략을 수립하는 시간입니다.', category: 'ceo' },
                    { time: '14:00-15:00', title: '신규 AI 서비스 수익화 모델 회의', description: '구독형 서비스, API 판매 등 구체적인 수익 창출 방안을 논의하고 가격 정책을 결정합니다.', category: 'ceo' },
                    { time: '15:30-16:30', title: '국민카드 전화', category: 'admin' },
                    { time: '16:30-17:30', title: '프로젝트 투자 효율성(ROI) 분석', description: '진행 중인 R&D 및 사업 프로젝트의 비용 대비 효과를 분석하고 예산 배분을 최적화합니다.', category: 'ceo' }
                ]
            },
            {
                date: '2026-01-16',
                dayName: '목요일',
                events: [
                    { time: '10:00-12:30', title: '쿠팡 수익 구조 정밀 진단 및 BM 최적화', description: '쿠팡 플랫폼에서의 매출 데이터를 정밀 분석하여 수익률이 낮은 품목을 정리하고, 영업이익률을 극대화할 수 있는 마진 구조로 비즈니스 모델(BM)을 최종 튜닝합니다.', category: 'revenue' },
                    { time: '10:15-11:15', title: '지법 서관 412호', category: 'admin' },
                    { time: '13:00-14:00', title: '법인 인감증명서 발급', location: '강남구청', category: 'admin' },
                    { time: '14:00-15:30', title: '자동화 시스템 보안 점검 및 데이터 효율화', description: '사이버 보안 및 스마트시티 공학적 관점에서 현재 운영 중인 자동화 시스템의 데이터 보안을 점검하고, Python 기반 데이터 파이프라인의 효율성을 개선하여 운영 리소스를 절감합니다.', category: 'tech' },
                    { time: '16:30-18:00', title: '주간 ROI 평가 및 차주 리소스 배분 확정', description: '한 주간의 성과를 ROI 관점에서 종합 평가하고, 다음 주 쿠팡 수익화를 위한 핵심 실행 과제를 선정하여 리소스를 집중 배치합니다.', category: 'revenue' }
                ]
            },
            {
                date: '2026-01-18',
                dayName: '토요일',
                events: [
                    { time: '10:00-12:30', title: '쿠팡 BM 분석 및 수익 구조 최적화 전략', description: 'AI 기업 CEO로서 한 주의 시작 전, 쿠팡 수익화 모델의 현금 흐름을 정밀 분석하고 데이터 기반의 BM 고도화 방향성을 설정합니다.', category: 'revenue' },
                    { time: '14:00-15:30', title: '시스템 보안 점검 및 데이터 기술 고도화', description: '공학 박사 및 보안 전문가의 관점에서 운영 자동화 시스템의 데이터 보안성을 검토하고, Python 기반 파이프라인의 처리 효율 극대화를 위한 R&D 계획을 수립합니다.', category: 'tech' },
                    { time: '16:30-18:00', title: '차주 ROI 목표 설정 및 자원 배분 확정', description: '실행 위주의 효율성을 고려하여 차주 프로젝트별 ROI 목표를 설정하고, 핵심 성과 지표(KPI) 달성을 위한 팀별 리소스 배분을 확정합니다.', category: 'revenue' }
                ]
            },
            {
                date: '2026-01-19',
                dayName: '일요일',
                events: [
                    { time: '09:30-10:30', title: '저신용 소상공인 대출(3천만)', category: 'admin' },
                    { time: '10:30-11:45', title: '대출 서류 작성', category: 'admin' },
                    { time: '14:00-14:45', title: '재무상태 최적화(관악)', category: 'admin' }
                ]
            }
        ];

        // 카테고리 정의
        const categoryInfo = {
            revenue: { name: '수익화 전략', color: '#d68910' },
            ceo: { name: 'CEO 업무', color: '#3182ce' },
            tech: { name: '기술/R&D', color: '#2e7d32' },
            meeting: { name: '미팅', color: '#c2185b' },
            admin: { name: '행정업무', color: '#7b1fa2' },
            other: { name: '기타', color: '#546e7a' }
        };

        // 시간 계산 함수
        function parseTimeRange(timeRange) {
            if (!timeRange || !timeRange.includes('-')) return 0;
            const [start, end] = timeRange.split('-');
            const [startH, startM] = start.split(':').map(Number);
            const [endH, endM] = end.split(':').map(Number);
            const startMinutes = startH * 60 + startM;
            const endMinutes = endH * 60 + endM;
            return (endMinutes - startMinutes) / 60;
        }

        // 통계 계산
        let totalHours = 0;
        let totalEvents = 0;
        const categoryHours = {};
        const dailyHours = {};

        calendarEvents.forEach(day => {
            let dayHours = 0;
            day.events.forEach(event => {
                const hours = parseTimeRange(event.time);
                totalHours += hours;
                totalEvents++;
                dayHours += hours;
                
                if (!categoryHours[event.category]) {
                    categoryHours[event.category] = 0;
                }
                categoryHours[event.category] += hours;
            });
            dailyHours[day.dayName] = dayHours;
        });

        // 통계 표시
        document.getElementById('totalHours').textContent = totalHours.toFixed(1);
        document.getElementById('totalEvents').textContent = totalEvents;
        
        const busiestDay = Object.entries(dailyHours).reduce((a, b) => a[1] > b[1] ? a : b);
        document.getElementById('busiestDay').textContent = busiestDay[0];
        
        const avgDaily = (totalHours / 7).toFixed(1);
        document.getElementById('avgDaily').textContent = avgDaily;

        // 카테고리별 차트
        const categoryCtx = document.getElementById('categoryChart').getContext('2d');
        new Chart(categoryCtx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(categoryHours).map(key => categoryInfo[key].name),
                datasets: [{
                    data: Object.values(categoryHours),
                    backgroundColor: Object.keys(categoryHours).map(key => categoryInfo[key].color),
                    borderWidth: 2,
                    borderColor: '#fff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            font: { size: 14 },
                            padding: 15
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const label = context.label || '';
                                const value = context.parsed || 0;
                                const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                const percentage = ((value / total) * 100).toFixed(1);
                                return `${label}: ${value.toFixed(1)}시간 (${percentage}%)`;
                            }
                        }
                    }
                }
            }
        });

        // 일별 차트
        const dailyCtx = document.getElementById('dailyChart').getContext('2d');
        new Chart(dailyCtx, {
            type: 'bar',
            data: {
                labels: ['월', '화', '수', '목', '금', '토', '일'],
                datasets: [{
                    label: '일정 시간',
                    data: [
                        dailyHours['월요일'] || 0,
                        dailyHours['화요일'] || 0,
                        dailyHours['수요일'] || 0,
                        dailyHours['목요일'] || 0,
                        dailyHours['금요일'] || 0,
                        dailyHours['토요일'] || 0,
                        dailyHours['일요일'] || 0
                    ],
                    backgroundColor: 'rgba(102, 126, 234, 0.8)',
                    borderColor: 'rgba(102, 126, 234, 1)',
                    borderWidth: 2,
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function(value) {
                                return value + '시간';
                            }
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.parsed.y.toFixed(1) + '시간';
                            }
                        }
                    }
                }
            }
        });

        // 타임라인 생성
        const timelineContent = document.getElementById('timelineContent');
        calendarEvents.forEach(day => {
            if (day.events.length === 0) return;
            
            const daySection = document.createElement('div');
            daySection.className = 'day-section';
            
            const dayHeader = document.createElement('div');
            dayHeader.className = 'day-header';
            dayHeader.innerHTML = `
                <div class="day-name">${day.dayName}</div>
                <div class="day-date">${day.date}</div>
            `;
            daySection.appendChild(dayHeader);
            
            day.events.forEach(event => {
                const eventItem = document.createElement('div');
                eventItem.className = 'event-item';
                
                const categoryName = categoryInfo[event.category].name;
                
                eventItem.innerHTML = `
                    <div class="event-time">${event.time}</div>
                    <div class="event-title">${event.title}</div>
                    ${event.description ? `<div class="event-description">${event.description}</div>` : ''}
                    ${event.location ? `<div class="event-description">📍 ${event.location}</div>` : ''}
                    <span class="category-badge category-${event.category}">${categoryName}</span>
                `;
                daySection.appendChild(eventItem);
            });
            
            timelineContent.appendChild(daySection);
        });

        // 인사이트 생성
        const insightsContent = document.getElementById('insightsContent');
        
        // 가장 많은 시간을 할애한 카테고리
        const topCategory = Object.entries(categoryHours).reduce((a, b) => a[1] > b[1] ? a : b);
        
        const insights = [
            `이번 주 가장 많은 시간을 투자한 분야는 <strong>${categoryInfo[topCategory[0]].name}</strong>으로 총 <strong>${topCategory[1].toFixed(1)}시간</strong>을 할애했습니다.`,
            `평균 일일 일정 시간은 <strong>${avgDaily}시간</strong>이며, 가장 바쁜 날은 <strong>${busiestDay[0]}</strong>로 <strong>${busiestDay[1].toFixed(1)}시간</strong>의 일정이 잡혀있습니다.`,
            `총 <strong>${totalEvents}개</strong>의 일정 중 쿠팡 관련 수익화 전략 회의가 <strong>4회</strong>로 가장 높은 빈도를 보이고 있습니다.`,
            `CEO 업무와 수익화 전략이 전체 일정의 <strong>${(((categoryHours['ceo'] || 0) + (categoryHours['revenue'] || 0)) / totalHours * 100).toFixed(1)}%</strong>를 차지하여 비즈니스 성장에 집중하고 계십니다.`
        ];
        
        insights.forEach(insight => {
            const item = document.createElement('div');
            item.className = 'insight-item';
            item.innerHTML = insight;
            insightsContent.appendChild(item);
        });
    </script>
</body>
</html>
