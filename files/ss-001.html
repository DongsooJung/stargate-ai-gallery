        thead th.sorted-desc::after { content: ' ▼'; font-size: 10px; }

    "Stargate folder sync notion", "Weekly nara bid scan", "Notion weekly health check",
    "Weekly review docx", "Weekly dashboard", "Notion monthly archive cleanup"
];

let filtered = [...DATA];
let sortCol = "num", sortDir = "asc";

function init() {
    populateFilters();
    applyFilters();
    document.getElementById("filterCategory").addEventListener("change", applyFilters);
    document.getElementById("filterDate").addEventListener("change", applyFilters);
    document.querySelectorAll("#detailTable thead th").forEach(th => {
        th.addEventListener("click", () => sortTable(th.dataset.col));
    });
}

function populateFilters() {
    const cats = [...new Set(DATA.map(d => d.cat))].sort();
    const sel = document.getElementById("filterCategory");
    cats.forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = c; sel.appendChild(o); });
}

function applyFilters() {
    const cat = document.getElementById("filterCategory").value;
    const dt = document.getElementById("filterDate").value;
    filtered = DATA.filter(d => {
        if (cat !== "all" && d.cat !== cat) return false;
        if (dt === "dated" && !d.date) return false;
        if (dt === "undated" && d.date) return false;
        return true;
    });
    updateKPIs();
    updateCharts();
    updateInsights();
    updateTable();
}

function updateKPIs() {
    const total = filtered.length;
    const dated = filtered.filter(d => d.date).length;
    const cats = new Set(filtered.map(d => d.cat)).size;
    const autoCount = filtered.filter(d => d.cat === "자동화/스케줄").length;
    const autoPct = total ? Math.round(autoCount / total * 100) : 0;
    const dates = filtered.filter(d => d.date).map(d => d.date);
    const uniqueDates = new Set(dates).size;
    const avgPerDay = uniqueDates ? (dated / uniqueDates).toFixed(1) : "-";

    const kpis = [
        {label:"총 세션 수", value: total, sub:`날짜 확인 ${dated} / 미상 ${total-dated}`},
        {label:"자동화 세션 비율", value: `${autoPct}%`, sub:`${autoCount}건 / ${total}건`},
        {label:"일평균 세션 (확인분)", value: avgPerDay, sub:`${uniqueDates}일간 데이터`},
        {label:"활용 카테고리", value: cats, sub:`11개 중 ${cats}개 사용`},
        {label:"가장 많은 카테고리", value: getTopCat(), sub:"전체 세션 기준"}
    ];
    const section = document.getElementById("kpiSection");
    section.innerHTML = kpis.map(k => `<div class="kpi-card"><div class="kpi-label">${k.label}</div><div class="kpi-value">${k.value}</div><div class="kpi-sub">${k.sub}</div></div>`).join("");
}

function getTopCat() {
    const counts = {};
    filtered.forEach(d => counts[d.cat] = (counts[d.cat]||0)+1);
    return Object.entries(counts).sort((a,b) => b[1]-a[1])[0]?.[0] || "-";
}

let chartCat, chartDonut, chartTimeline, chartRepeat, chartStacked;

function updateCharts() {
    updateCategoryChart();
    updateDoughnutChart();
    updateTimelineChart();
    updateRepeatChart();
    updateStackedChart();
}

function updateCategoryChart() {
    const counts = {};
    filtered.forEach(d => counts[d.cat] = (counts[d.cat]||0)+1);
    const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
    const labels = sorted.map(s => s[0]);
    const values = sorted.map(s => s[1]);
    const colors = labels.map(l => CAT_COLORS[l]?.bg || "#b2bec3");

    if (chartCat) chartCat.destroy();
    chartCat = new Chart(document.getElementById("chartCategory"), {
        type: "bar",
        data: { labels, datasets: [{ data: values, backgroundColor: colors, borderRadius: 6, barThickness: 28 }] },
        options: { indexAxis:"y", responsive:true, plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.raw}건`}}}, scales:{x:{grid:{display:false}},y:{grid:{display:false}}} }
    });
}

function updateDoughnutChart() {
    const counts = {};
    filtered.forEach(d => counts[d.cat] = (counts[d.cat]||0)+1);
    const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
    const labels = sorted.map(s => s[0]);
    const values = sorted.map(s => s[1]);
    const colors = labels.map(l => CAT_COLORS[l]?.bg || "#b2bec3");

    if (chartDonut) chartDonut.destroy();
    chartDonut = new Chart(document.getElementById("chartDoughnut"), {
        type: "doughnut",
        data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 2, borderColor: "#fff" }] },
        options: { responsive:true, plugins:{legend:{position:"right",labels:{boxWidth:12,font:{size:11}}},tooltip:{callbacks:{label:ctx=>{const t=ctx.dataset.data.reduce((a,b)=>a+b,0);return `${ctx.label}: ${ctx.raw}건 (${Math.round(ctx.raw/t*100)}%)`}}}}}
    });
}

function updateTimelineChart() {
    const dated = filtered.filter(d => d.date);
    const byDate = {};
    dated.forEach(d => byDate[d.date] = (byDate[d.date]||0)+1);
    const sorted = Object.entries(byDate).sort((a,b) => a[0].localeCompare(b[0]));
    const labels = sorted.map(s => s[0].slice(5));
    const values = sorted.map(s => s[1]);

    if (chartTimeline) chartTimeline.destroy();
    chartTimeline = new Chart(document.getElementById("chartTimeline"), {
        type: "bar",
        data: { labels, datasets: [{
            label: "세션 수", data: values, backgroundColor: "rgba(108,92,231,0.6)", borderColor: "#6c5ce7", borderWidth: 1, borderRadius: 4
        }]},
        options: { responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,ticks:{stepSize:1}},x:{grid:{display:false}}} }
    });
}

function updateRepeatChart() {
    const titleCounts = {};
    filtered.forEach(d => titleCounts[d.title] = (titleCounts[d.title]||0)+1);
    const top = Object.entries(titleCounts).filter(e => e[1]>1).sort((a,b) => b[1]-a[1]).slice(0,10);
    const labels = top.map(t => t[0].length > 30 ? t[0].slice(0,30)+"..." : t[0]);
    const values = top.map(t => t[1]);

    if (chartRepeat) chartRepeat.destroy();
    chartRepeat = new Chart(document.getElementById("chartRepeat"), {
        type: "bar",
        data: { labels, datasets: [{data: values, backgroundColor: "rgba(253,203,110,0.7)", borderColor: "#fdcb6e", borderWidth: 1, borderRadius: 4, barThickness: 20}] },
        options: { indexAxis:"y", responsive:true, plugins:{legend:{display:false}}, scales:{x:{beginAtZero:true,ticks:{stepSize:1}},y:{grid:{display:false},ticks:{font:{size:11}}}} }
    });
}

function updateStackedChart() {
    const dated = filtered.filter(d => d.date && AUTOMATION_TASKS.includes(d.title));
    const dates = [...new Set(dated.map(d => d.date))].sort();
    const taskSet = [...new Set(dated.map(d => d.title))];
    const palette = ["#6c5ce7","#00b894","#fdcb6e","#e17055","#0984e3","#fd79a8","#a29bfe","#636e72","#ffeaa7","#74b9ff","#e6a77e","#b2bec3"];
    const datasets = taskSet.map((task, i) => ({
        label: task.length > 25 ? task.slice(0,25)+"..." : task,
        data: dates.map(dt => dated.filter(d => d.date === dt && d.title === task).length),
        backgroundColor: palette[i % palette.length],
        borderRadius: 2
    }));

    if (chartStacked) chartStacked.destroy();
    chartStacked = new Chart(document.getElementById("chartStacked"), {
        type: "bar",
        data: { labels: dates.map(d => d.slice(5)), datasets },
        options: { responsive:true, plugins:{legend:{position:"bottom",labels:{boxWidth:10,font:{size:10}}}}, scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,beginAtZero:true,ticks:{stepSize:1}}} }
    });
}

function updateInsights() {
    const autoSessions = filtered.filter(d => AUTOMATION_TASKS.includes(d.title));
    const dailyTasks = ["Daily ai news briefing","Daily realestate urban data","Daily koi boj monitor","Notion daily briefing generator","Notion OKR/KPI"];
    const weeklyTasks = ["Weekly nara bid scan","Notion weekly health check","Weekly review docx","Weekly dashboard"];

    const dailyCount = filtered.filter(d => dailyTasks.includes(d.title)).length;
    const weeklyCount = filtered.filter(d => weeklyTasks.includes(d.title)).length;
    const datedDates = [...new Set(filtered.filter(d => d.date).map(d => d.date))];
    const avgDailyAuto = datedDates.length ? (filtered.filter(d => d.date && dailyTasks.includes(d.title)).length / datedDates.length).toFixed(1) : 0;

    const insights = [
        {title:"일간 반복 태스크 5종", desc:`AI뉴스, 부동산데이터, KOI/BOJ, 브리핑, OKR/KPI가 매일 반복. 총 ${dailyCount}건으로 전체의 ${Math.round(dailyCount/filtered.length*100)}%. 하루 평균 ${avgDailyAuto}건 자동실행.`},
        {title:"주간 반복 태스크 4종", desc:`나라장터입찰, Notion헬스체크, 주간리뷰, 대시보드. 총 ${weeklyCount}건. 일요일(3/30)에 집중 실행.`},
        {title:"통합 가능성", desc:`Daily briefing + AI news를 하나의 세션으로 통합하면 하루 1~2세션 절약 가능. Stargate sync는 이미 3/23 이후 불규칙 → 통합 또는 weekly로 전환 권장.`},
        {title:"파일 정리 세션 과다", desc:`파일/폴더 정리가 ${filtered.filter(d=>d.cat==="파일/폴더 정리").length}건(${Math.round(filtered.filter(d=>d.cat==="파일/폴더 정리").length/filtered.length*100)}%). 반복 패턴 → 자동 정리 스크립트 또는 정기 스케줄화 권장.`}
    ];

    document.getElementById("insightGrid").innerHTML = insights.map(i => `<div class="insight-item"><h4>${i.title}</h4><p>${i.desc}</p></div>`).join("");
}

function updateTable() {
    document.getElementById("tableCount").textContent = filtered.length;
    const sorted = [...filtered].sort((a,b) => {
        let va = a[sortCol], vb = b[sortCol];
        if (sortCol === "num") return sortDir === "asc" ? va-vb : vb-va;
        if (sortCol === "date") { va = va||"9999"; vb = vb||"9999"; }
        return sortDir === "asc" ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
    });

    document.getElementById("tableBody").innerHTML = sorted.map(d => {
        const cc = CAT_COLORS[d.cat] || CAT_COLORS["기타"];
        return `<tr>
            <td>${d.num}</td>
            <td class="date-badge">${d.date || "(미상)"}</td>
            <td>${d.title}</td>
            <td><span class="cat-badge" style="background:${cc.light};color:${cc.text}">${d.cat}</span></td>
        </tr>`;
    }).join("");

    document.querySelectorAll("#detailTable thead th").forEach(th => {
        th.classList.remove("sorted-asc","sorted-desc");
        if (th.dataset.col === sortCol) th.classList.add(sortDir === "asc" ? "sorted-asc" : "sorted-desc");
    });
}

function sortTable(col) {
    if (sortCol === col) sortDir = sortDir === "asc" ? "desc" : "asc";
    else { sortCol = col; sortDir = "asc"; }
    updateTable();
}

init();
</script>
</body>
</html>
